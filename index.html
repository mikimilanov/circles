<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#dcdcdc" />
  <title>Target Task - Fixed Counts 54</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #dcdcdc;
      font-family: Arial, sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
    }
    body { position: fixed; inset: 0; }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: pointer;
    }
    .toolbar-trigger {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: max(28px, env(safe-area-inset-top));
      z-index: 30;
      background: transparent;
    }
    .toolbar {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translate(-50%, -110%);
      transition: transform 180ms ease;
      background: rgba(255,255,255,0.97);
      border: 1px solid #d0d0d0;
      border-top: none;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      padding: calc(10px + env(safe-area-inset-top)) 12px 10px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      z-index: 40;
      direction: rtl;
      flex-wrap: wrap;
      justify-content: center;
    }
    .toolbar.visible { transform: translate(-50%, 0); }
    .toolbar button {
      border: 1px solid #cfcfcf;
      background: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #f5f5f5; }
    .toolbar .meta {
      font-size: 12px;
      color: #666;
      margin-inline-start: 8px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="toolbarTrigger" class="toolbar-trigger"></div>
  <div id="toolbar" class="toolbar" aria-hidden="true">
    <button id="nextBtn">מטרה הבאה</button>
    <button id="toggleHomeBtn">הסתר נקודת בית</button>
    <button id="jsonBtn">ייצוא JSON</button>
    <button id="csvBtn">ייצוא CSV</button>
    <button id="clearBtn">איפוס</button>
    <span id="meta" class="meta">0 / 54</span>
  </div>

  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const toolbar = document.getElementById('toolbar');
    const toolbarTrigger = document.getElementById('toolbarTrigger');
    const meta = document.getElementById('meta');
    const toggleHomeBtn = document.getElementById('toggleHomeBtn');

    const ANGLES = [-32, -16, -8, -4, 0, 4, 8, 16, 32];

    // Fixed counts adjusted to sum exactly to 54 while staying as close as possible
    // to the requested weights:
    // 2.782, 7.975, 13.214, 16.264, 19.473, 16.264, 13.214, 7.975, 2.782
    const ANGLE_TARGET_COUNTS = {
      "-32": 2,
      "-16": 4,
      "-8": 7,
      "-4": 9,
      "0": 10,
      "4": 9,
      "8": 7,
      "16": 4,
      "32": 2
    };

    const HEIGHT_TARGET_COUNTS = {
      eye: 22,
      chest: 32
    };

    const TOTAL_TRIALS = 54;

    let logs = [];
    let currentTarget = null;
    let finished = false;
    let showHome = true;
    let targetsList = [];
    let currentIndex = 0;

    function updateMeta() {
      meta.textContent = `${logs.length} / ${TOTAL_TRIALS}`;
    }

    function showToolbar() {
      toolbar.classList.add('visible');
      toolbar.setAttribute('aria-hidden', 'false');
    }

    function hideToolbar() {
      toolbar.classList.remove('visible');
      toolbar.setAttribute('aria-hidden', 'true');
    }

    toolbarTrigger.addEventListener('mouseenter', showToolbar);
    toolbar.addEventListener('mouseenter', showToolbar);
    toolbarTrigger.addEventListener('mouseleave', () => setTimeout(checkToolbarHide, 60));
    toolbar.addEventListener('mouseleave', () => setTimeout(checkToolbarHide, 60));

    document.addEventListener('mousemove', (e) => {
      if (e.clientY <= 18) showToolbar();
    });

    function checkToolbarHide() {
      if (!toolbar.matches(':hover') && !toolbarTrigger.matches(':hover')) hideToolbar();
    }

    function getViewportWidth() {
      return window.visualViewport ? window.visualViewport.width : window.innerWidth;
    }

    function getViewportHeight() {
      return window.visualViewport ? window.visualViewport.height : window.innerHeight;
    }

    function resizeCanvas() {
      const vw = getViewportWidth();
      const vh = getViewportHeight();
      const dpr = window.devicePixelRatio || 1;

      canvas.width = Math.floor(vw * dpr);
      canvas.height = Math.floor(vh * dpr);
      canvas.style.width = vw + 'px';
      canvas.style.height = vh + 'px';

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawCurrent();
    }

    function shuffle(array) {
      const a = [...array];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function generateTargets() {
      const targets = [];

      for (const [angle, count] of Object.entries(ANGLE_TARGET_COUNTS)) {
        for (let i = 0; i < count; i++) {
          targets.push({ angle: Number(angle) });
        }
      }

      const heights = [
        ...Array(HEIGHT_TARGET_COUNTS.eye).fill('eye'),
        ...Array(HEIGHT_TARGET_COUNTS.chest).fill('chest')
      ];

      const shuffledHeights = shuffle(heights);

      for (let i = 0; i < targets.length; i++) {
        targets[i].height = shuffledHeights[i];
      }

      return shuffle(targets);
    }

    function getBoard() {
      const w = getViewportWidth();
      const h = getViewportHeight();

      const board = {
        x: w * 0.06,
        y: h * 0.08,
        width: w * 0.88,
        height: h * 0.84,
        radius: 20
      };

      const origin = {
        x: board.x + board.width / 2,
        y: board.y + board.height * 0.92
      };

      const eyeY = board.y + board.height * 0.28;
      const chestY = board.y + board.height * 0.56;

      const maxHorizontalPx = (board.width / 2) * 0.88;
      const pxPerDegree = maxHorizontalPx / 32;

      const targetRadiusPx = Math.max(14, Math.min(board.width, board.height) * 0.016);

      return { board, origin, eyeY, chestY, pxPerDegree, targetRadiusPx };
    }

    function drawBoard(board) {
      ctx.fillStyle = '#f6f6f6';
      ctx.strokeStyle = '#d7d7d7';
      ctx.lineWidth = 2;
      roundRect(ctx, board.x, board.y, board.width, board.height, board.radius);
      ctx.fill();
      ctx.stroke();
    }

    function drawFinishedScreen() {
      const { board } = getBoard();
      ctx.clearRect(0, 0, getViewportWidth(), getViewportHeight());
      drawBoard(board);
      ctx.fillStyle = '#2f2f2f';
      ctx.font = '28px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('הניסוי הסתיים', getViewportWidth() / 2, getViewportHeight() / 2 - 10);
      ctx.font = '18px Arial';
      ctx.fillStyle = '#666';
      ctx.fillText(`${TOTAL_TRIALS} ניסיונות הושלמו`, getViewportWidth() / 2, getViewportHeight() / 2 + 24);
    }

    function drawTarget(target) {
      if (finished) {
        drawFinishedScreen();
        return;
      }

      const { board, origin, eyeY, chestY, pxPerDegree, targetRadiusPx } = getBoard();

      ctx.clearRect(0, 0, getViewportWidth(), getViewportHeight());
      drawBoard(board);

      const x = origin.x + target.angle * pxPerDegree;
      const y = target.height === 'eye' ? eyeY : chestY;

      ctx.beginPath();
      ctx.arc(x, y, targetRadiusPx, 0, Math.PI * 2);
      ctx.fillStyle = '#2e9f48';
      ctx.fill();

      if (showHome) {
        ctx.beginPath();
        ctx.arc(origin.x, origin.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#9aa0a6';
        ctx.fill();
      }

      currentTarget = {
        trial: logs.length + 1,
        angle: target.angle,
        height: target.height,
        x: Number(x.toFixed(2)),
        y: Number(y.toFixed(2)),
        targetSizePx: Number(targetRadiusPx.toFixed(2)),
        shownAtISO: new Date().toISOString(),
        shownAtMs: Date.now(),
        homeVisible: showHome
      };
    }

    function drawCurrent() {
      if (finished) {
        drawFinishedScreen();
        return;
      }
      if (currentTarget) {
        drawTarget(currentTarget);
      } else if (targetsList.length > 0 && currentIndex < targetsList.length) {
        drawTarget(targetsList[currentIndex]);
      }
    }

    function nextTarget() {
      if (finished) return;

      if (currentTarget) {
        logs.push(currentTarget);
        updateMeta();
      }

      if (logs.length >= TOTAL_TRIALS || currentIndex >= targetsList.length - 1) {
        finished = true;
        currentTarget = null;
        drawFinishedScreen();
        return;
      }

      currentIndex += 1;
      drawTarget(targetsList[currentIndex]);
    }

    function downloadText(filename, text, type) {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportJSON() {
      const payload = {
        exportedAtISO: new Date().toISOString(),
        trialCount: logs.length,
        totalTrialsConfigured: TOTAL_TRIALS,
        angles: ANGLES,
        angleTargetCounts: ANGLE_TARGET_COUNTS,
        heightTargetCounts: HEIGHT_TARGET_COUNTS,
        logs
      };
      downloadText('target_task_logs.json', JSON.stringify(payload, null, 2), 'application/json');
    }

    function exportCSV() {
      const headers = ['trial','angle','height','x','y','targetSizePx','shownAtISO','shownAtMs','homeVisible'];
      const rows = logs.map(row => headers.map(h => row[h]));
      const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
      downloadText('target_task_logs.csv', csv, 'text/csv;charset=utf-8;');
    }

    function resetTask() {
      logs = [];
      currentTarget = null;
      finished = false;
      currentIndex = 0;
      targetsList = generateTargets();
      updateMeta();
      drawTarget(targetsList[currentIndex]);
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    toggleHomeBtn.addEventListener('click', () => {
      showHome = !showHome;
      toggleHomeBtn.textContent = showHome ? 'הסתר נקודת בית' : 'הצג נקודת בית';
      if (finished) {
        drawFinishedScreen();
      } else if (currentTarget) {
        drawTarget(currentTarget);
      } else if (targetsList.length > 0) {
        drawTarget(targetsList[currentIndex]);
      }
    });

    document.getElementById('nextBtn').addEventListener('click', nextTarget);
    document.getElementById('jsonBtn').addEventListener('click', exportJSON);
    document.getElementById('csvBtn').addEventListener('click', exportCSV);
    document.getElementById('clearBtn').addEventListener('click', resetTask);

    window.addEventListener('resize', resizeCanvas);
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', resizeCanvas);
      window.visualViewport.addEventListener('scroll', resizeCanvas);
    }

    window.addEventListener('keydown', (e) => {
      if (toolbar.matches(':hover')) return;
      e.preventDefault();
      nextTarget();
    });
    canvas.addEventListener('pointerdown', nextTarget);

    updateMeta();
    targetsList = generateTargets();
    drawTarget(targetsList[currentIndex]);
    resizeCanvas();
  </script>
</body>
</html>
